<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Caribbean Supply</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f1e3c 0%, #1a2a4a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(6, 182, 212, 0.3);
      border-radius: 16px;
      padding: 40px;
      color: white;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      font-size: 2em;
      color: #06b6d4;
      margin-bottom: 5px;
    }

    .logo p {
      font-size: 0.9em;
      color: rgba(255, 255, 255, 0.5);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.9em;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(6, 182, 212, 0.3);
      border-radius: 8px;
      color: white;
      font-size: 1em;
      transition: all 0.3s;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    input:focus {
      outline: none;
      border-color: #06b6d4;
      background: rgba(6, 182, 212, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      font-size: 1em;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(6, 182, 212, 0.3);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .error {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.5);
      color: #fca5a5;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9em;
      display: none;
      margin-bottom: 20px;
    }

    .error.show {
      display: block;
    }

    .info {
      text-align: center;
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.85em;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>🔐 Admin</h1>
      <p>Caribbean Supply</p>
    </div>

    <div id="error" class="error"></div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="password">Mot de passe Admin</label>
        <input
          type="password"
          id="password"
          placeholder="Ton mot de passe"
          required
          autofocus
        >
      </div>

      <button type="submit" class="login-btn">Se connecter</button>
    </form>

    <div class="info">
      Accès réservé à l'administrateur
    </div>
  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault()

      const password = document.getElementById('password').value
      const errorDiv = document.getElementById('error')

      // Mot de passe admin (simple pour demo)
      // À remplacer par une vraie authentification en production
      const ADMIN_PASSWORD = 'admin123'

      if (password === ADMIN_PASSWORD) {
        // Stocker le token de session
        sessionStorage.setItem('admin_session', 'true')
        sessionStorage.setItem('admin_time', Date.now())

        // Rediriger vers l'admin dashboard
        window.location.href = '/admin'
      } else {
        errorDiv.textContent = '❌ Mot de passe incorrect'
        errorDiv.classList.add('show')
        document.getElementById('password').focus()

        setTimeout(() => {
          errorDiv.classList.remove('show')
        }, 3000)
      }
    }

    // Vérifier si déjà connecté
    if (sessionStorage.getItem('admin_session') === 'true') {
      window.location.href = '/admin'
    }
  </script>
</body>
</html>
