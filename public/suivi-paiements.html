<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suivi des Conteneurs — Caribbean Supply</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f1e3c 0%, #1a2a4a 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      color: white;
    }

    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      color: #06b6d4;
    }

    header p {
      font-size: 1.1em;
      color: rgba(255, 255, 255, 0.7);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .summary-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(6, 182, 212, 0.3);
      border-radius: 12px;
      padding: 20px;
      color: white;
      backdrop-filter: blur(10px);
    }

    .summary-card h3 {
      font-size: 0.9em;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .summary-card .value {
      font-size: 2.5em;
      font-weight: bold;
      color: #06b6d4;
    }

    .containers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
      gap: 25px;
    }

    .container-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(6, 182, 212, 0.4);
      border-radius: 12px;
      padding: 25px;
      color: white;
      backdrop-filter: blur(10px);
    }

    .container-card h2 {
      font-size: 1.5em;
      margin-bottom: 5px;
      color: #06b6d4;
    }

    .container-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(6, 182, 212, 0.2);
    }

    .info-item {
      display: flex;
      flex-direction: column;
    }

    .info-item label {
      font-size: 0.85em;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .info-item value {
      font-size: 1.1em;
      font-weight: 600;
    }

    .status-badge {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-vide {
      background: rgba(229, 231, 235, 0.2);
      color: #d1d5db;
    }

    .status-en_cours {
      background: rgba(59, 130, 246, 0.2);
      color: #93c5fd;
    }

    .status-plein {
      background: rgba(34, 197, 94, 0.2);
      color: #86efac;
    }

    .fill-bar {
      width: 100%;
      height: 30px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 15px;
      overflow: hidden;
      margin-bottom: 10px;
      position: relative;
    }

    .fill-progress {
      height: 100%;
      background: linear-gradient(90deg, #06b6d4, #0891b2);
      transition: width 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9em;
      font-weight: 600;
      min-width: 30px;
    }

    .capacity-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.9em;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 15px;
    }

    .clients-section {
      margin-top: 20px;
    }

    .clients-section h3 {
      font-size: 1.1em;
      color: #06b6d4;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.95em;
    }

    .client-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .client-item {
      background: rgba(6, 182, 212, 0.1);
      border-left: 3px solid #06b6d4;
      padding: 12px;
      border-radius: 4px;
      font-size: 0.95em;
    }

    .client-name {
      font-weight: 600;
      color: #ffffff;
    }

    .client-details {
      display: flex;
      justify-content: space-between;
      margin-top: 5px;
      font-size: 0.85em;
      color: rgba(255, 255, 255, 0.6);
    }

    .empty-message {
      text-align: center;
      padding: 20px;
      color: rgba(255, 255, 255, 0.4);
      font-style: italic;
    }

    .loading {
      text-align: center;
      color: white;
      padding: 40px;
    }

    .loading::after {
      content: '';
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { content: '⠋'; }
      14% { content: '⠙'; }
      28% { content: '⠹'; }
      42% { content: '⠸'; }
      57% { content: '⠼'; }
      71% { content: '⠴'; }
      85% { content: '⠦'; }
      100% { content: '⠧'; }
    }

    footer {
      text-align: center;
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid rgba(6, 182, 212, 0.2);
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.9em;
    }

    @media (max-width: 1024px) {
      .containers-grid {
        grid-template-columns: 1fr;
      }

      header h1 {
        font-size: 2em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📦 Suivi des Conteneurs</h1>
      <p>Consultez l'état de remplissage et les clients payés par destination</p>
    </header>

    <div id="summary" class="summary" style="display: none;">
      <div class="summary-card">
        <h3>Conteneurs Actifs</h3>
        <div class="value" id="total-containers">0</div>
      </div>
      <div class="summary-card">
        <h3>Volume Payé</h3>
        <div class="value"><span id="total-paid">0</span> CBM</div>
      </div>
      <div class="summary-card">
        <h3>Taux d'Utilisation</h3>
        <div class="value"><span id="utilization">0</span>%</div>
      </div>
      <div class="summary-card">
        <h3>Capacité Totale</h3>
        <div class="value"><span id="total-capacity">201</span> CBM</div>
      </div>
    </div>

    <div id="loading" class="loading">Chargement des données...</div>
    <div id="containers-grid" class="containers-grid" style="display: none;"></div>
  </div>

  <footer>
    Caribbean Supply — Suivi en temps réel • Mise à jour automatique toutes les 10 secondes
  </footer>

  <script>
    async function loadTracking() {
      try {
        const response = await fetch('/api/container-tracking')
        const data = await response.json()

        // Mettre à jour le résumé
        document.getElementById('total-containers').textContent = data.summary.totalContainers
        document.getElementById('total-paid').textContent = data.summary.totalPaid.toFixed(2)
        document.getElementById('utilization').textContent = data.summary.totalUtilization.toFixed(1)

        // Mettre à jour les conteneurs
        const grid = document.getElementById('containers-grid')
        grid.innerHTML = ''

        data.containers.forEach((container) => {
          const statusClass = `status-${container.status}`
          const clientsHtml = container.paidClients.length > 0
            ? container.paidClients.map(client => `
              <div class="client-item">
                <div class="client-name">✓ ${client.name}</div>
                <div class="client-details">
                  <span>${client.cbm} CBM</span>
                  <span>${client.amount.toFixed(2)}€</span>
                  <span>${client.position}</span>
                </div>
              </div>
            `).join('')
            : '<div class="empty-message">Aucun client payé</div>'

          const fillPercentage = Math.min(100, container.fillPercentage)

          const card = document.createElement('div')
          card.className = 'container-card'
          card.innerHTML = `
            <h2>${container.destination}</h2>
            <div class="container-info">
              <div class="info-item">
                <label>Conteneur</label>
                <value>${container.id}</value>
              </div>
              <div class="info-item">
                <label>Statut</label>
                <span class="status-badge ${statusClass}">${container.status.replace('_', ' ')}</span>
              </div>
            </div>

            <div class="fill-bar">
              <div class="fill-progress" style="width: ${fillPercentage}%">
                ${fillPercentage > 5 ? fillPercentage.toFixed(1) + '%' : ''}
              </div>
            </div>

            <div class="capacity-info">
              <span>${container.currentLoad.toFixed(2)} / ${container.capacity} CBM</span>
              <span>${container.paidClients.length} client${container.paidClients.length !== 1 ? 's' : ''}</span>
            </div>

            <div class="clients-section">
              <h3>💳 Clients Payés</h3>
              <div class="client-list">
                ${clientsHtml}
              </div>
            </div>
          `
          grid.appendChild(card)
        })

        document.getElementById('loading').style.display = 'none'
        document.getElementById('summary').style.display = 'grid'
        grid.style.display = 'grid'
      } catch (error) {
        console.error('Erreur:', error)
        document.getElementById('loading').textContent = 'Erreur lors du chargement des données'
      }
    }

    // Charger au démarrage et recharger toutes les 10 secondes
    loadTracking()
    setInterval(loadTracking, 10000)
  </script>
</body>
</html>
