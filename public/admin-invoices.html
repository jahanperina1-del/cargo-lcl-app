<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Upload Factures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .admin-container { max-width: 600px; margin: 60px auto; padding: 0 20px; }
    .admin-card { background: #fff; border: 1px solid var(--line); border-radius: var(--r-xl); padding: 40px; box-shadow: var(--sh-lg); }
    .admin-card h1 { color: var(--navy-700); margin-bottom: 30px; }
    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--navy-700); font-size: 0.9rem; }
    .form-group input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--line-strong); border-radius: var(--r-md); font-size: 1rem; }
    .form-group input:focus { outline: none; border-color: var(--turq-500); box-shadow: 0 0 0 3px rgba(22,198,192,.12); }
    .dropzone { border: 2px dashed var(--line-strong); border-radius: var(--r-md); padding: 30px; text-align: center; cursor: pointer; transition: all .2s; }
    .dropzone:hover, .dropzone.drag { border-color: var(--turq-500); background: rgba(22,198,192,.05); }
    .dropzone p { color: var(--slate); margin: 0; }
    .file-name { color: var(--turq-600); font-weight: 600; margin-top: 10px; }
    .btn-upload { width: 100%; background: var(--navy-700); color: #fff; padding: 14px; border: none; border-radius: var(--r-md); font-weight: 600; cursor: pointer; transition: all .2s; }
    .btn-upload:hover { background: var(--navy-600); }
    .btn-upload:disabled { opacity: 0.6; cursor: not-allowed; }
    .status { padding: 14px; border-radius: var(--r-md); margin-top: 20px; text-align: center; font-weight: 600; display: none; }
    .status.success { background: rgba(16,185,129,.1); color: var(--turq-600); display: block; }
    .status.error { background: rgba(220,38,38,.1); color: #dc2626; display: block; }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-card">
      <h1>📄 Upload Facture Client</h1>

      <form id="invoiceForm">
        <div class="form-group">
          <label for="clientNumber">Numéro Client *</label>
          <input type="text" id="clientNumber" placeholder="ex: MTQ-001-001" required />
        </div>

        <div class="form-group">
          <label for="sessionId">Session ID (Facture) *</label>
          <input type="text" id="sessionId" placeholder="ID de la session Stripe" required />
        </div>

        <div class="form-group">
          <label>Fichier PDF *</label>
          <div class="dropzone" id="dropzone">
            <p>📎 Glisse-dépose le PDF ici ou clique pour sélectionner</p>
            <input type="file" id="fileInput" accept=".pdf" style="display: none;" />
            <div class="file-name" id="fileName"></div>
          </div>
        </div>

        <button type="submit" class="btn-upload" id="submitBtn">Uploader la facture</button>
        <div class="status" id="status"></div>
      </form>
    </div>
  </div>

  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const fileNameDisplay = document.getElementById('fileName');
    const form = document.getElementById('invoiceForm');
    const status = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    // Click to upload
    dropzone.addEventListener('click', () => fileInput.click());

    // File selection
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) {
        fileNameDisplay.textContent = `✓ ${e.target.files[0].name}`;
      }
    });

    // Drag & drop
    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('drag');
    });

    dropzone.addEventListener('dragleave', () => {
      dropzone.classList.remove('drag');
    });

    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('drag');
      fileInput.files = e.dataTransfer.files;
      if (fileInput.files[0]) {
        fileNameDisplay.textContent = `✓ ${fileInput.files[0].name}`;
      }
    });

    // Form submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const clientNumber = document.getElementById('clientNumber').value;
      const sessionId = document.getElementById('sessionId').value;
      const file = fileInput.files[0];

      if (!file || !clientNumber || !sessionId) {
        showStatus('Tous les champs sont requis', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Upload en cours...';

      const formData = new FormData();
      formData.append('file', file);
      formData.append('clientNumber', clientNumber);
      formData.append('sessionId', sessionId);

      try {
        const response = await fetch('/api/orders/upload-invoice', {
          method: 'POST',
          body: formData,
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || 'Erreur upload');
        }

        showStatus(`✓ Facture uploadée avec succès!`, 'success');
        form.reset();
        fileNameDisplay.textContent = '';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Uploader la facture';
      } catch (error) {
        showStatus(`✗ ${error.message}`, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Uploader la facture';
      }
    });

    function showStatus(message, type) {
      status.textContent = message;
      status.className = `status ${type}`;
      setTimeout(() => {
        status.className = 'status';
      }, 5000);
    }
  </script>
</body>
</html>
