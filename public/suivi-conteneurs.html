<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suivi des Conteneurs — Caribbean Supply</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .tracking-hero {
      position: relative;
      background: radial-gradient(1200px 600px at 78% 8%, rgba(22,198,192,.16), transparent 60%),
                  radial-gradient(900px 500px at 10% 90%, rgba(255,122,61,.12), transparent 55%),
                  linear-gradient(160deg, #15264A 0%, #0C1A33 60%, #0A1730 100%);
      padding: 80px 20px 60px;
      text-align: center;
      color: #fff;
    }
    .tracking-hero h1 {
      font-size: 48px;
      font-weight: 700;
      margin: 0 0 12px 0;
      font-family: 'Space Grotesk', sans-serif;
    }
    .tracking-hero p {
      font-size: 18px;
      color: rgba(255,255,255,.8);
      margin: 0;
    }

    .containers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
      gap: 40px;
      max-width: 1000px;
      margin: 60px auto;
      padding: 0 20px;
    }

    .container-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,.1);
      position: relative;
      transition: transform .3s ease, box-shadow .3s ease;
    }
    .container-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 60px rgba(0,0,0,.15);
    }

    .container-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
    }
    .container-title {
      font-size: 28px;
      font-weight: 700;
      color: #15264A;
      margin: 0;
      font-family: 'Space Grotesk', sans-serif;
    }
    .container-badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .container-badge.empty {
      background: #E8F5E9;
      color: #2E7D32;
    }
    .container-badge.filling {
      background: #FFF3E0;
      color: #E65100;
    }
    .container-badge.full {
      background: #FFEBEE;
      color: #C62828;
    }

    .gauge-container {
      margin-bottom: 30px;
    }
    .gauge-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .gauge-label-text {
      color: #666;
      font-weight: 500;
    }
    .gauge-label-value {
      color: #15264A;
      font-weight: 700;
      font-family: 'Share Tech Mono', monospace;
    }

    .gauge-bar {
      height: 32px;
      background: #f0f0f0;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 2px 4px rgba(0,0,0,.05);
    }
    .gauge-fill {
      height: 100%;
      background: linear-gradient(90deg, #16C6C0, #00B8B0);
      border-radius: 16px;
      transition: width .6s ease;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 12px;
      color: #fff;
      font-weight: 600;
      font-size: 13px;
      font-family: 'Share Tech Mono', monospace;
    }
    .gauge-fill.filling {
      background: linear-gradient(90deg, #FF7A3D, #FF9A5D);
    }
    .gauge-fill.full {
      background: linear-gradient(90deg, #E63946, #F77F88);
    }

    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }
    .stat {
      text-align: center;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #16C6C0;
      font-family: 'Share Tech Mono', monospace;
      margin-bottom: 4px;
    }
    .stat-label {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .last-updated {
      text-align: center;
      color: #999;
      font-size: 12px;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid #f0f0f0;
      border-top-color: #16C6C0;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .containers-grid {
        grid-template-columns: 1fr;
        gap: 30px;
      }
      .tracking-hero h1 {
        font-size: 36px;
      }
      .container-card {
        padding: 30px;
      }
    }
  </style>
</head>
<body>

<div class="tracking-hero">
  <h1>📦 Suivi des Conteneurs</h1>
  <p>État actuel du remplissage par destination</p>
</div>

<div class="containers-grid" id="grid">
  <div class="loading">
    <div class="spinner"></div>
    <p>Chargement des données…</p>
  </div>
</div>

<div class="last-updated" id="updated"></div>

<script>
const CONTAINER_CAPACITY = 67; // CBM par 40 pieds

const destinations = {
  MTQ: { name: 'Martinique', flag: '🇲🇶' },
  GLP: { name: 'Guadeloupe', flag: '🇬🇵' },
  GUY: { name: 'Guyane', flag: '🇬🇫' },
};

async function load() {
  try {
    const res = await fetch('/api/container-stats');
    const data = await res.json();

    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    Object.entries(data.containers).forEach(([code, stats]) => {
      const dest = destinations[code];
      const percent = stats.percent;
      const statusClass = percent >= 100 ? 'full' : percent >= 50 ? 'filling' : 'empty';
      const statusText = percent >= 100 ? 'PLEIN' : percent >= 50 ? 'EN COURS' : 'VIDE';

      const card = document.createElement('div');
      card.className = 'container-card';
      card.innerHTML = `
        <div class="container-header">
          <h2 class="container-title">${dest.flag} ${dest.name}</h2>
          <span class="container-badge ${statusClass}">${statusText}</span>
        </div>

        <div class="gauge-container">
          <div class="gauge-label">
            <span class="gauge-label-text">Remplissage</span>
            <span class="gauge-label-value">${percent}%</span>
          </div>
          <div class="gauge-bar">
            <div class="gauge-fill ${statusClass}" style="width: ${percent}%">
              ${percent > 10 ? percent + '%' : ''}
            </div>
          </div>
        </div>

        <div class="stats-row">
          <div class="stat">
            <div class="stat-value">${stats.cbm.toFixed(2)}</div>
            <div class="stat-label">CBM remplis</div>
          </div>
          <div class="stat">
            <div class="stat-value">${(stats.capacity - stats.cbm).toFixed(2)}</div>
            <div class="stat-label">CBM restants</div>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });

    // Afficher l'heure de mise à jour
    const updated = new Date(data.lastUpdated);
    const timeStr = updated.toLocaleString('fr-FR', {
      month: 'short',
      day: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    });
    document.getElementById('updated').textContent = `Mis à jour le ${timeStr}`;

  } catch (error) {
    console.error('Erreur:', error);
    document.getElementById('grid').innerHTML = `
      <div class="loading">
        <p style="color: red;">Erreur lors du chargement des données</p>
      </div>
    `;
  }
}

// Charger immédiatement et rafraîchir toutes les 10 secondes
load();
setInterval(load, 10000);
</script>

</body>
</html>
