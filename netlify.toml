[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = ".next"

[functions]
  node_bundler = "esbuild"
  included_files = ["lib/**/*.ts"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  condition = "!{path: /api/*, /static/*, /.well-known/*}"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[env.production]
  command = "npm run build"
  publish = ".next"
